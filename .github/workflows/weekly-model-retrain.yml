name: Weekly Model Retrain

on:
  workflow_run:
    workflows: ["Weekly Data Refresh"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      fresh_tuning:
        description: 'Run fresh Optuna hyperparameter tuning?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      optuna_trials:
        description: 'Number of Optuna trials (if fresh_tuning=true)'
        required: false
        default: '25'
        type: string

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      issues: write

    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TRAINING_DATA_SOURCE: supabase
      OPTUNA_TRIALS: ${{ github.event.inputs.optuna_trials || '25' }}
      FRESH_TUNING: ${{ github.event.inputs.fresh_tuning || '0' }}
      N_ESTIMATORS: '3000'
      HDB_STRICT_EXTERNAL_STEPS: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy python-dotenv psycopg2-binary pyarrow scipy scikit-learn xgboost lightgbm catboost optuna shap

      - name: Restore model assets cache
        uses: actions/cache/restore@v4
        with:
          path: ML/model_assets
          key: model-assets-${{ hashFiles('ML/model_assets/latest.txt') }}
          restore-keys: model-assets-

      - name: Run ML pipeline
        id: run_ml
        working-directory: scripts
        run: python run_ml_pipeline.py

      - name: Guard model promotion quality
        if: steps.run_ml.outcome == 'success'
        working-directory: scripts
        run: python -c "from pipeline_orchestration import run_supabase_model_version_sync; run_supabase_model_version_sync('weekly-model-retrain-preflight', dry_run=True)"

      - name: Save model assets cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ML/model_assets
          key: model-assets-${{ github.run_id }}

      - name: Commit and push updated model assets
        if: steps.run_ml.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          RUN_DIR=$(cat ML/model_assets/latest.txt 2>/dev/null || echo "unknown")
          METRICS_FILE="ML/${RUN_DIR}/metrics.json"

          if [ -f "$METRICS_FILE" ]; then
            WINNER_NAME=$(python3 -c "import json; m=json.load(open('$METRICS_FILE')); print(m.get('winner',{}).get('winner','ensemble'))" 2>/dev/null || echo "ensemble")
            WINNER=$(python3 -c "import json; m=json.load(open('$METRICS_FILE')); w=m.get('winner',{}); print(f\"{w.get('winner','?')} | MAPE {w.get('test_mape','?')}% | RMSE {w.get('test_rmse','?')}\")" 2>/dev/null || echo "metrics unavailable")
          else
            WINNER_NAME="ensemble"
            WINNER="metrics unavailable"
          fi

          # Force-add winner model + supporting metadata (run dirs are gitignored)
          git add -f \
            "ML/${RUN_DIR}/${WINNER_NAME}_model.pkl" \
            "ML/${RUN_DIR}/metrics.json" \
            "ML/${RUN_DIR}/feature_cols.txt" \
            "ML/${RUN_DIR}/model_comparison.json" \
            "ML/${RUN_DIR}/run_manifest.json" \
            "ML/${RUN_DIR}/training_report.txt" \
            "ML/${RUN_DIR}/scaler.pkl" \
            "ML/${RUN_DIR}/target_encoders.pkl" \
            "ML/${RUN_DIR}/rolling_stats_snapshot.pkl" 2>/dev/null || true

          # Add root-level model_assets files (optuna meta, outlier bounds)
          git add ML/model_assets/optuna_study_*_meta.json ML/model_assets/outlier_bounds.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No model asset changes to commit."
            exit 0
          fi

          git commit -m "chore(ml): retrain model [$(date -u +%Y-%m-%d)]

          Run: $(basename \"$RUN_DIR\")
          Winner: ${WINNER_NAME}_model.pkl
          Results: $WINNER
          Triggered by: ${{ github.event_name }}"
          git pull --rebase origin main
          git push

      - name: Sync model version to Supabase
        if: steps.run_ml.outcome == 'success'
        working-directory: scripts
        run: python sync_to_supabase.py

      - name: Trigger Render deploy
        if: steps.run_ml.outcome == 'success' && env.RENDER_DEPLOY_HOOK != ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" "$RENDER_DEPLOY_HOOK"
          echo " — Render deploy triggered."

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.issues.create({
              owner,
              repo,
              title: `Weekly model retrain failed: ${new Date().toISOString().slice(0, 10)}`,
              body: `The weekly model retrain pipeline failed.\n\n[View logs](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})`,
              labels: ['pipeline-failure']
            });
