name: Weekly Data Refresh

on:
  schedule:
    - cron: '0 3 * * 3' # Every Wednesday at 03:00 UTC (11:00 SGT)
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      issues: write

    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      HDB_SQLITE_PATH: ${{ github.workspace }}/Data Preprocessing/hdb_resale.db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy python-dotenv psycopg2-binary

      - name: Restore SQLite cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: Data Preprocessing/hdb_resale.db
          key: sqlite-db-${{ github.run_id }}
          restore-keys: sqlite-db-

      - name: Validate restored SQLite cache
        id: sqlite-cache
        run: |
          python - <<'PY'
          import os
          import sqlite3

          path = "Data Preprocessing/hdb_resale.db"
          valid = False

          if os.path.exists(path) and os.path.getsize(path) > 0:
              try:
                  conn = sqlite3.connect(path)
                  row = conn.execute(
                      "SELECT 1 FROM sqlite_master WHERE type='table' AND name='resale_prices'"
                  ).fetchone()
                  valid = row is not None
                  conn.close()
              except sqlite3.Error as exc:
                  print(f"SQLite cache validation failed: {exc}")

          if not valid and os.path.exists(path):
              os.remove(path)

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"valid={'true' if valid else 'false'}\n")

          print("SQLite cache is valid." if valid else "No valid SQLite cache found.")
          PY

      - name: Restore raw CSV cache
        id: raw-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: Data Preprocessing/raw
          key: hdb-raw-${{ github.run_id }}
          restore-keys: hdb-raw-

      - name: Seed raw CSV cache
        run: |
          mkdir -p "Data Preprocessing/raw"
          cp -n "Data Preprocessing/raw hdb data/"*.csv "Data Preprocessing/raw/"

      - name: Download seed DB on cache miss
        if: steps.sqlite-cache.outputs.valid != 'true'
        run: |
          gh release download data-seed -p hdb_resale.db -D "Data Preprocessing/" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run data preprocessing pipeline
        working-directory: scripts
        run: python -u run_data_preprocessing.py

      - name: Save SQLite cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: Data Preprocessing/hdb_resale.db
          key: sqlite-db-${{ github.run_id }}

      - name: Save raw CSV cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: Data Preprocessing/raw
          key: hdb-raw-${{ github.run_id }}

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.issues.create({
              owner,
              repo,
              title: `Weekly data refresh failed: ${new Date().toISOString().slice(0, 10)}`,
              body: `The weekly data refresh pipeline failed.\n\n[View logs](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})`,
              labels: ['pipeline-failure']
            });
